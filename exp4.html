<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Lab Experiments Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            height: 100vh; 
            background: #f4f7f6; 
        }

        .sidebar { 
            width: 260px; 
            background: #2c3e50; 
            color: white; 
            padding: 25px; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar h2 { 
            margin-bottom: 30px; 
            font-size: 1.5rem;
            text-align: center; 
            border-bottom: 2px solid #3498db; 
            padding-bottom: 10px; 
        }
        .sidebar button { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            background: #34495e; 
            border: 1px solid #555; 
            color: white; 
            cursor: pointer; 
            text-align: left; 
            border-radius: 6px; 
            transition: all 0.3s ease; 
        }
        .sidebar button:hover { 
            background: #3498db; 
            border-color: #fff; 
            transform: translateX(5px);
        }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .exp-section { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }

        .form-container { max-width: 500px; }
        .form-container input { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-size: 14px;
        }

        .btn-primary, .btn-add { 
            background: #3498db; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-primary:hover, .btn-add:hover { background: #2980b9; }

        .actions { margin: 25px 0; display: flex; gap: 12px; flex-wrap: wrap; }
        .actions button { 
            padding: 10px 18px; 
            border-radius: 6px; 
            border: 2px solid #3498db; 
            background: transparent; 
            color: #3498db; 
            font-weight: bold;
            cursor: pointer; 
            transition: 0.3s;
        }
        .actions button:hover { background: #3498db; color: white; }

        .output-screen, #displayArea { 
            margin-top: 25px; 
            padding: 20px; 
            background: #fdfdfd; 
            border-left: 5px solid #3498db; 
            border-radius: 4px;
            min-height: 80px; 
            color: #333;
            font-size: 15px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.02);
        }
        ul { list-style: square; padding-left: 20px; }
        li { margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Lab Panel</h2>
        <button onclick="showExperiment(4)">Experiment 4: Grades</button>
        <button onclick="showExperiment(5)">Experiment 5: Employees</button>
    </div>

    <div class="main-content">
        
        <section id="exp4" class="exp-section">
            <h1>Experiment 4: Grade Calculator</h1>
            <p>Calculates Total, Average, and Grade using <code>for</code> loops and <code>if-else</code> logic.</p>
            <button class="btn-primary" onclick="calculateGrades()">
                Launch Calculator (Prompt)
            </button>
            <div id="displayArea">Result will be displayed here...</div>
        </section>

        <section id="exp5" class="exp-section" style="display:none;">
            <h1>Experiment 5: Employee Records</h1>
            <p>Store and filter employee data using Arrays of Objects.</p>
            
            <div class="form-container">
                <input type="text" id="empName" placeholder="Employee Full Name">
                <input type="text" id="empID" placeholder="Employee ID">
                <input type="number" id="empSalary" placeholder="Salary (₹)">
                <input type="text" id="empDept" placeholder="Department">
                <button class="btn-add" onclick="addEmployee()">Add Employee Record</button>
            </div>

            <div class="actions">
                <button onclick="displayAll()">Show All Records</button>
                <button onclick="filterHighSalary()">Filter Salary > 50,000</button>
                <button onclick="calculateStats()">View Financial Stats</button>
            </div>

            <div id="output" class="output-screen">
                Waiting for records...
            </div>
        </section>

    </div>

    <script src="exp4.js"></script>
</body>
</html>
